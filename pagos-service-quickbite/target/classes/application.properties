spring.application.name=PagosServiceQuickBite
server.port=8085

# Base de datos adaptada dinamicamente para Docker o Local
spring.datasource.url=jdbc:mysql://${DB_PAGOS_HOST:localhost}:${DB_PAGOS_PORT:3306}/quickbite_pagos?createDatabaseIfNotExist=true
spring.datasource.username=${DB_PAGOS_USER:root}
spring.datasource.password=${DB_PAGOS_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate se encarga de crear las tablas de transacciones si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Flyway desactivado para mantener la misma linea de desarrollo agil
spring.flyway.enabled=false