server.port=8083
spring.application.name=MenuServiceQuickBite

# Base de datos
spring.datasource.url=jdbc:mysql://${DB_MENU_SERVICE_HOST:localhost}:${DB_MENU_SERVICE_PORT:3306}/db_menu?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${DB_MENU_SERVICE_USER:root}
spring.datasource.password=${DB_MENU_SERVICE_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
