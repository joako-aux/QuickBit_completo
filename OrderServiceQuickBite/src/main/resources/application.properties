spring.application.name=OrderServiceQuickBite
server.port=8084

# Base de datos adaptada dinamicamente para Docker o Local
spring.datasource.url=jdbc:mysql://${DB_ORDER_HOST:localhost}:${DB_ORDER_PORT:3306}/quickbite_order?createDatabaseIfNotExist=true
spring.datasource.username=${DB_ORDER_USER:root}
spring.datasource.password=${DB_ORDER_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate se encarga de crear las tablas automaticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Flyway apagado por ahora en desarrollo agil
spring.flyway.enabled=false

# Agregar al final de las propiedades de cada microservicio
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html