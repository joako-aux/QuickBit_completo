# Servidor y Puerto del Microservicio
server.port=8083
spring.application.name=menu

# Configuracin de la Base de Datos (MySQL) - Adaptada para Docker
spring.datasource.url=jdbc:mysql://${DB_MENU_HOST:localhost}:${DB_MENU_PORT:3306}/db_menu?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${DB_MENU_USER:root}
spring.datasource.password=${DB_MENU_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracin de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true