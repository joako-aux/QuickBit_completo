spring.application.name=NotificationServiceQuickBite
server.port=8086

# Base de datos adaptada para Docker
spring.datasource.url=jdbc:mysql://${DB_NOTIF_HOST:localhost}:${DB_NOTIF_PORT:3306}/quickbite_notifications?createDatabaseIfNotExist=true
spring.datasource.username=${DB_NOTIF_USER:root}
spring.datasource.password=${DB_NOTIF_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Configuracion de Servidor de Email dinamico (Mailtrap por defecto)
spring.mail.host=${SMTP_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${SMTP_PORT:2525}
spring.mail.username=${SMTP_USER:tu_usuario_de_pruebas}
spring.mail.password=${SMTP_PASS:tu_contrasena_de_aplicacion}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true